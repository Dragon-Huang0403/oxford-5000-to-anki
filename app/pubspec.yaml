name: deckionary
description: "Deckionary — Dictionary with FSRS Spaced Repetition"
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  drift: any
  drift_flutter: any
  sqlite3: any
  sqlite3_flutter_libs: any

  # State management
  flutter_riverpod: any

  # Routing
  go_router: any

  # Audio
  just_audio: any

  # FSRS spaced repetition
  fsrs: any

  # HTTP
  http: any

  # Background downloads
  background_downloader: ^8.0.0

  # Auth & Sync
  supabase_flutter: any
  firebase_core: any
  google_sign_in: any

  # App update
  package_info_plus: any
  url_launcher: any
  in_app_update: any

  # Utilities
  uuid: any
  connectivity_plus: ">=6.0.0 <7.1.0" # 7.1.x requires macOS 26 SDK (Xcode 26+)
  path_provider: any
  collection: any

  # Logging & monitoring
  talker_flutter: any
  talker_riverpod_logger: any
  sentry_flutter: any

  # macOS quick search (global hotkey + window + tray)
  hotkey_manager: any
  window_manager: any
  tray_manager: any
  screen_retriever: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: any
  build_runner: any
  supabase: any
  sentry_dart_plugin: any

flutter:
  uses-material-design: true
  assets:
    - assets/

sentry:
  upload_debug_symbols: true
  commits: auto
  ignore_missing: true
