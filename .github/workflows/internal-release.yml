name: Internal Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: internal-release
  cancel-in-progress: true

jobs:
  upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode Firebase config
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Download dictionary database
        run: curl -fSL -o assets/oald10.db "${{ secrets.R2_BASE_URL }}/db/oald10.db"

      - name: Set up Android signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            '${{ secrets.ANDROID_KEY_ALIAS }}' \
            '${{ secrets.ANDROID_KEY_PASSWORD }}' > android/key.properties

      - name: Build AAB
        run: >-
          flutter build appbundle --release
          --build-number=${{ github.run_number }}
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=R2_BASE_URL=${{ secrets.R2_BASE_URL }}
          --dart-define=BUILD_COMMIT=${{ github.sha }}

      - name: Decode Google Play service account
        run: echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/service-account.json

      - name: Upload to Play Internal Release
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.deckionary.deckionary
          releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
